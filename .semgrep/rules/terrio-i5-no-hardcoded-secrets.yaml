rules:
  # I5-1 -- Hardcoded Bearer tokens in source. Always a leak.
  - id: terrio-i5-hardcoded-bearer-token
    message: |
      Hardcoded Bearer token detected. Tokens MUST come from env / secret
      manager / expo-secure-store / SecureStore. Never check them in.
      For test fixtures, use placeholders like "test-token-XYZ" (the regex
      below requires 30+ chars to avoid catching short stubs).
    languages: [generic]
    severity: ERROR
    pattern-regex: 'Bearer\s+[A-Za-z0-9_\-\.]{30,}'
    paths:
      exclude:
        - '**/*.test.*'
        - '**/*.spec.*'
        - '**/__tests__/**'
        - '**/__mocks__/**'
        - '**/test-fixtures/**'
        - '**/fixtures/**'
        - '**/node_modules/**'
        - '**/dist/**'
        - '**/build/**'
        - '**/.env.example'
        - '**/CHANGELOG.md'
        - '**/*.md'
        - '**/coverage/**'
        - '**/.next/**'

  # I5-2 -- JS/TS hardcoded API key/token assignment.
  - id: terrio-i5-js-hardcoded-api-key
    message: |
      Hardcoded API key/secret/token literal in JavaScript/TypeScript.
      Move to process.env / expo-constants / a secret manager. Never
      check long opaque secrets into source control.
    languages: [typescript, javascript]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              const $X = "$Y"
          - pattern: |
              let $X = "$Y"
          - pattern: |
              var $X = "$Y"
      - metavariable-regex:
          metavariable: $X
          regex: '^(API_KEY|apiKey|API_SECRET|apiSecret|SECRET|secret|TOKEN|token|AUTH_TOKEN|authToken|PRIVATE_KEY|privateKey|JWT_SECRET|jwtSecret)$'
      - metavariable-regex:
          metavariable: $Y
          regex: '^[A-Za-z0-9_\-]{30,}$'
    paths:
      exclude:
        - '**/*.test.*'
        - '**/*.spec.*'
        - '**/__tests__/**'
        - '**/__mocks__/**'
        - '**/test-fixtures/**'
        - '**/node_modules/**'
        - '**/dist/**'
        - '**/build/**'
        - '**/.env.example'

  # I5-3 -- Python hardcoded API key/token assignment.
  - id: terrio-i5-python-hardcoded-secret
    message: |
      Hardcoded API key/secret/token literal in Python. Move to
      os.environ / pydantic-settings / a secret manager.
    languages: [python]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $X = "$Y"
          - pattern: |
              $X: str = "$Y"
      - metavariable-regex:
          metavariable: $X
          regex: '^(API_KEY|api_key|API_SECRET|api_secret|SECRET|secret|TOKEN|token|AUTH_TOKEN|auth_token|PRIVATE_KEY|private_key|JWT_SECRET|jwt_secret)$'
      - metavariable-regex:
          metavariable: $Y
          regex: '^[A-Za-z0-9_\-]{30,}$'
    paths:
      exclude:
        - '**/test_*.py'
        - '**/*_test.py'
        - '**/tests/**'
        - '**/conftest.py'
        - '**/.tox/**'
        - '**/__pycache__/**'
