rules:
  # I7-1 -- JS/TS eval / new Function = code injection vector.
  - id: terrio-i7-js-no-eval
    message: |
      eval() / new Function() are code-injection vectors. Use JSON.parse
      for JSON, lookup tables for dispatch, or a proper expression parser
      (e.g. expr-eval, jexl) that doesn't evaluate arbitrary code.
    languages: [typescript, javascript]
    severity: ERROR
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)
    paths:
      exclude:
        - '**/*.test.*'
        - '**/*.spec.*'
        - '**/__tests__/**'
        - '**/node_modules/**'
        - '**/dist/**'
        - '**/build/**'

  # I7-2 -- Python subprocess shell=True = command injection vector.
  - id: terrio-i7-python-no-shell-true
    message: |
      subprocess(..., shell=True) is a command-injection vector when any
      argument is user-controlled. Use shell=False (default) and pass
      args as a list. If you really need shell features, use shlex.split
      on a static command string.
    languages: [python]
    severity: ERROR
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: os.system(...)
      - pattern: os.popen(...)
    paths:
      exclude:
        - '**/test_*.py'
        - '**/tests/**'

  # I7-3 -- Python eval/exec on input = code injection.
  - id: terrio-i7-python-no-eval
    message: |
      eval()/exec() in Python execute arbitrary code. Use ast.literal_eval
      for safe data parsing, or a proper deserialiser (json, yaml.safe_load).
    languages: [python]
    severity: ERROR
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)
    paths:
      exclude:
        - '**/test_*.py'
        - '**/tests/**'
