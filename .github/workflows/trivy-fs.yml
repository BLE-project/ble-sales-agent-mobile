# Trivy filesystem CVE scan — drop-in for repos that do not publish a Docker
# image (mobile apps, SDK libraries, web frontends). Scans lockfiles
# (package-lock.json, Podfile.lock, Package.resolved, gradle/dependencies)
# for HIGH/CRITICAL CVEs and uploads results to GitHub Code Scanning.

name: Trivy filesystem scan

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - 'Podfile.lock'
      - 'Package.resolved'
      - 'gradle/**'
      - '**/build.gradle*'
      - '**/Cargo.lock'
  push:
    branches: [main, master]
  schedule:
    - cron: '37 4 * * 2'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (table output for PR comment)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Run Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs-results.sarif

      - name: Fail on fixable HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
