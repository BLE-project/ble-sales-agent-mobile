name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm test -- --coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const t=require('./coverage/coverage-summary.json').total; const rows=['lines','statements','functions','branches'].map(m => '| '+m+' | '+t[m].pct+'% | '+t[m].covered+'/'+t[m].total+' |').join('\n'); console.log('### Test coverage\n\n| Metric | % | Covered/Total |\n|---|---|---|\n'+rows);" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No coverage-summary.json produced.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 30

