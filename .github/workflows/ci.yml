name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm test -- --coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const t=require('./coverage/coverage-summary.json').total; const rows=['lines','statements','functions','branches'].map(m => '| '+m+' | '+t[m].pct+'% | '+t[m].covered+'/'+t[m].total+' |').join('\n'); console.log('### Test coverage\n\n| Metric | % | Covered/Total |\n|---|---|---|\n'+rows);" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No coverage-summary.json produced.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 30

      # T6 (2026-05-31): self-hosted SonarQube scan. Reads sonar-project.properties
      # (projectKey + javascript.lcov.reportPaths=coverage/lcov.info). Gated on the
      # SONAR_TOKEN secret — skips cleanly until the operator provisions SONAR_TOKEN +
      # makes SONAR_HOST_URL reachable from GitHub runners (mirrors the GlitchTip gate
      # pattern already in the fleet). No CI-red while unprovisioned.
      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
